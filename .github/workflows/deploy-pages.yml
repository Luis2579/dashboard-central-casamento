name: Publicar Dashboard no GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
      - name: Preparar arquivos
        run: |
          rm -rf public
          mkdir public
          cp index.html styles.css app.js config.js cloud.js public/
          cp -r assets public/assets
          touch public/.nojekyll
      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
